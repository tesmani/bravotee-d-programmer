<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Sent</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      background: linear-gradient(135deg, #f0f0f0, #d9f0ff);
      font-family: Arial, sans-serif;
    }
    .thankyou {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      max-width: 400px;
    }
    .thankyou h1 {
      color: #2c7be5;
      margin-bottom: 10px;
    }
    .thankyou p {
      margin-bottom: 20px;
    }
    .thankyou a {
      display: inline-block;
      padding: 10px 20px;
      background: #2c7be5;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.3s;
    }
    .thankyou a:hover {
      background: #1a5bb8;
    }
  </style>
</head>
<body>
  <div class="thankyou">
    <h1>✅ Thank You!</h1>
    <p>Your message has been sent successfully.<br>
    I’ll get back to you as soon as possible.</p>
    <a href="index.html">⬅ Back to Home</a>
  </div>
</body>
</html>
